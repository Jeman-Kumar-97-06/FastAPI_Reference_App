<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* --- CSS Variables for easy theming --- */
        :root {
            --bg-color: #0f172a;      /* Dark slate */
            --text-main: #f8fafc;     /* Off-white */
            --text-muted: #94a3b8;    /* Cool gray */
            --accent: #38bdf8;        /* Sky blue */
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            
            /* Fluid spacing and sizing */
            --space-sm: 1rem;
            --space-md: 2rem;
            --radius: 0.375rem;
        }

        /* --- Modern CSS Reset --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Perfect centering in 3 lines */
            display: grid;
            place-items: center;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* --- Layout & Typography --- */
        .error-container {
            text-align: center;
            padding: var(--space-md);
            max-width: 600px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; /* Starts hidden for animation */
        }

        .error-code {
            /* Fluid typography scales perfectly between mobile and 4K without media queries */
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 1;
            /* Ghost text effect */
            color: transparent;
            -webkit-text-stroke: 2px rgba(148, 163, 184, 0.15);
            margin-bottom: calc(var(--space-sm) * -1);
            user-select: none;
        }

        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: var(--space-sm);
            position: relative;
            z-index: 10;
        }

        .error-message {
            color: var(--text-muted);
            font-size: 1.125rem;
            margin-bottom: var(--space-md);
            /* text-wrap: balance prevents awkward orphans on new lines */
            text-wrap: balance; 
        }

        /* --- Interactive Elements --- */
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background-color: transparent;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-home:hover, 
        .btn-home:focus-visible {
            background-color: var(--accent);
            color: var(--bg-color);
            outline: none;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        /* Accessibility: respect user motion preferences */
        @media (prefers-reduced-motion: reduce) {
            .error-container {
                animation: none;
                opacity: 1;
            }
            .btn-home {
                transition: none;
                transform: none;
            }
        }

        /* --- Keyframes --- */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <main class="error-container">
        <div class="error-code" aria-hidden="true">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="/" class="btn-home">Return to Homepage</a>
    </main>

</body>
</html>
